<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Radio Interferometer Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="main.css"/>
<script src="js/app.js"></script>

</head>

<body>

<div id="map"></div>

<!-- ================= INSET ================= -->
<div id="inset">
  <div id="closeInset" onclick="closeInset()">×</div>

  <canvas id="plot"></canvas>

  <!-- INFO PANEL -->
  <div id="infoPanel" style="display:none; color:white; padding:10px;">
    <img id="infoImg" src="" style="width:100%; border-radius:6px; margin-bottom:10px;">
    <div id="infoText" style="font-size:13px; line-height:1.4;"></div>
  </div>

  <div id="tooltip"></div>
</div>

<!-- ================= TOOLBAR ================= -->
<div class="controls">

  <br/><br/>

  <div class="control-group">
    <div class="group-label">OBSERVATORIES</div>
    <div class="group-row">
      <button onclick="loadTelescope('vla')">VLA 🇺🇸</button>
      <button onclick="loadTelescope('lofar')">LOFAR 🇳🇱</button>
      <button onclick="loadTelescope('meerkat')">MeerKAT 🇿🇦</button>
      <button onclick="loadTelescope('skalow')">SKA-Low 🇦🇺</button>
      <button onclick="loadTelescope('alma')">ALMA 🇨🇱</button>
    </div>
  </div>

  <div class="toolbar-sep"></div>

  <div class="control-group">
    <div class="group-label">ANALYSIS</div>
    <div class="group-row">
      <button onclick="showInfo()">ℹ️ Info</button>
      <button onclick="showDensityPlot()">📊 Density</button>
      <button onclick="alert('TBD feature')">🧪 TBD</button>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= MAP =================
const map = L.map('map').setView([20, 0], 3);

L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Tiles © Esri' }
).addTo(map);

// ================= STATE =================
let currentLayout = [];
let currentCenter = [0,0];
let currentTelescope = null;

// ================= WIKIPEDIA MAPPING =================
const wikiPages = {
  vla: "Very_Large_Array",
  lofar: "Low-Frequency_Array",
  meerkat: "MeerKAT",
  skalow: "Square_Kilometre_Array",
  alma: "Atacama_Large_Millimeter_Array"
};

// ================= FILE LOADERS =================
async function loadPosition(file) {
  const res = await fetch(file);
  const text = await res.text();
  const [lon, lat] = text.trim().split(/\s+/).map(Number);
  return [lat, lon];
}

async function loadLayout(file) {
  const res = await fetch(file);
  const text = await res.text();

  return text.trim().split("\n").map(l => {
    const [x,y] = l.trim().split(/\s+/).map(Number);
    return [x,y];
  });
}

// ================= ENU =================
function enuToLatLng(lat0, lon0, x, y) {
  const R = 6378137;

  const latRad = lat0 * Math.PI/180;
  const lonRad = lon0 * Math.PI/180;

  const dLat = y / R;
  const dLon = x / (R * Math.cos(latRad));

  return [
    (latRad + dLat)*180/Math.PI,
    (lonRad + dLon)*180/Math.PI
  ];
}

// ================= CAMERA =================
function flyTo(center, zoom, cb) {
  map.flyTo(center, zoom, {duration:3});
  setTimeout(cb, 3200);
}

// ================= CLEAN =================
function clearAntennas(){
  map.eachLayer(l=>{
    if(l instanceof L.CircleMarker) map.removeLayer(l);
  });
}

// ================= MAIN =================
async function loadTelescope(name){

  currentTelescope = name;

  closeInset(); // close inset plot when you click on another layout
  clearAntennas();

  const pos = await loadPosition(`data/position_${name}.txt`);
  const layout = await loadLayout(`data/layout_${name}.txt`);

  currentCenter = pos;
  currentLayout = layout;

  flyTo([20,0],2.5,()=>{
    flyTo(pos,15,()=>{

      layout.forEach(p=>{
        const [lat,lon] = enuToLatLng(pos[0],pos[1],p[0],p[1]);

        L.circleMarker([lat,lon],{
          radius:4,
          color:"lime",
          fillColor:"lime",
          fillOpacity:1,
          weight:2
        }).addTo(map);
      });

    });
  });
}

// ================= DENSITY PLOT =================
function showDensityPlot(){
  document.getElementById("infoPanel").style.display = "none";
  document.getElementById("plot").style.display = "block";

  const c = document.getElementById("plot");
  const ctx = c.getContext("2d");

  const W = c.width = 520;
  const H = c.height = 320;

  const radii = currentLayout.map(p =>
    Math.sqrt(p[0]*p[0] + p[1]*p[1])
  );

  const bins = 25;
  const maxR = Math.max(...radii);

  const hist = new Array(bins).fill(0);

  radii.forEach(r=>{
    const i = Math.min(bins-1, Math.floor((r/maxR)*bins));
    hist[i]++;
  });

  const maxC = Math.max(...hist);

  ctx.clearRect(0,0,W,H);

  const m = {l:55,r:15,t:15,b:45};
  const pw = W - m.l - m.r;
  const ph = H - m.t - m.b;

  ctx.strokeStyle = "#aaa";

  ctx.beginPath();
  ctx.moveTo(m.l, H - m.b);
  ctx.lineTo(W - m.r, H - m.b);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(m.l, m.t);
  ctx.lineTo(m.l, H - m.b);
  ctx.stroke();

  ctx.fillStyle = "lime";
  const bw = pw / bins;

  hist.forEach((v,i)=>{
    const h = (v / maxC) * ph;
    ctx.fillRect(m.l + i*bw, H - m.b - h, bw - 2, h);
  });

  document.getElementById("inset").style.display = "block";
}

// ================= WIKIPEDIA INFO =================
async function showInfo(){

  if (!currentTelescope) return;

  const inset = document.getElementById("inset");
  const infoPanel = document.getElementById("infoPanel");
  const plot = document.getElementById("plot");

  plot.style.display = "none";
  infoPanel.style.display = "block";

  const page = wikiPages[currentTelescope];
  const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${page}`;

  infoPanel.style.height = "auto";

  document.getElementById("infoText").innerText = "Loading...";

  inset.style.display = "block";

  try {
    const res = await fetch(url);
    const data = await res.json();

    document.getElementById("infoImg").src = data.thumbnail ? data.thumbnail.source : "";

    document.getElementById("infoText").innerHTML = `
      <b>${data.title}</b><br/><br/>
      ${data.extract}<br/><br/>
      <a href="https://en.wikipedia.org/wiki/${page}" target="_blank" style="color:lightblue;">
        Read more on Wikipedia →
      </a>
    `;

    // apparently you need to wait for layout to render, then resize inset
    requestAnimationFrame(() => {
      const rect = infoPanel.getBoundingClientRect();
      inset.style.height = rect.height + 20 + "px"; // padding buffer
    });

  } catch (e) {
    document.getElementById("infoText").innerText =
      "Failed to load Wikipedia data.";
  }

  inset.style.display = "block";
}
// ================= INSET =================
function closeInset(){
  document.getElementById("inset").style.display="none";
}
</script>

</body>
</html>
